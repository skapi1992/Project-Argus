<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGUS — Military Airspace Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <span class="header-title">PROJECT ARGUS</span>
            <span class="header-sep">&middot;</span>
            <span class="header-subtitle">Military Airspace Monitor</span>
            <span class="header-sep">&middot;</span>
            <span class="header-live" id="header-status">Live</span>
        </div>
    </header>

    <div class="stale-banner" id="stale-banner"></div>

    <main class="main">
        <div class="map-container">
            <div id="map"></div>

            <!-- Aircraft detail panel (click on marker) -->
            <div class="aircraft-detail" id="aircraft-detail">
                <button class="detail-close" id="detail-close" aria-label="Close">&times;</button>
                <div class="detail-photo-wrap" id="detail-photo-wrap">
                    <div class="detail-photo-placeholder" id="detail-photo-placeholder">No photo available</div>
                </div>
                <div class="detail-body">
                    <div class="detail-callsign" id="detail-callsign">—</div>
                    <div class="detail-model" id="detail-model">—</div>
                    <div class="detail-grid">
                        <div class="detail-field">
                            <span class="detail-label">Country</span>
                            <span class="detail-value" id="detail-country">—</span>
                        </div>
                        <div class="detail-field">
                            <span class="detail-label">ICAO24</span>
                            <span class="detail-value" id="detail-icao">—</span>
                        </div>
                        <div class="detail-field">
                            <span class="detail-label">Altitude</span>
                            <span class="detail-value" id="detail-alt">—</span>
                        </div>
                        <div class="detail-field">
                            <span class="detail-label">Speed</span>
                            <span class="detail-value" id="detail-spd">—</span>
                        </div>
                        <div class="detail-field">
                            <span class="detail-label">Heading</span>
                            <span class="detail-value" id="detail-hdg">—</span>
                        </div>
                        <div class="detail-field">
                            <span class="detail-label">Status</span>
                            <span class="detail-value" id="detail-status">—</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <aside class="stats-panel">
            <!-- Alert card (JS controls visibility via .visible class) -->
            <div class="alert-card" id="alert-card" aria-hidden="true">
                <div class="alert-header">
                    <span class="alert-level-badge" id="alert-level-badge"></span>
                    <button class="alert-dismiss" id="alert-dismiss" aria-label="Dismiss alert" title="Dismiss">&times;</button>
                </div>
                <div class="alert-message" id="alert-message"></div>
                <div class="alert-details" id="alert-details"></div>
                <button class="alert-toggle-details" id="alert-toggle-details" style="display:none">Show details</button>
            </div>

            <section class="stat-section summary-line">
                <span class="summary-item">Active now: <strong id="current-count">—</strong></span>
                <span class="summary-sep">&middot;</span>
                <span class="summary-item" id="last-updated-summary">Last update: —</span>
            </section>

            <section class="stat-section">
                <div class="timeline-controls" id="timeline-controls">
                    <button class="tl-btn" id="tl-play" aria-label="Play" title="Play timeline">&#9654;</button>
                    <input type="range" class="tl-slider" id="tl-slider" min="0" max="0" value="0">
                    <button class="tl-btn tl-live-btn active" id="tl-live" title="Return to live">LIVE</button>
                </div>
                <div class="tl-timestamp" id="tl-timestamp"></div>
            </section>

            <section class="stat-section">
                <h2 class="stat-label">Trend (7 Days)</h2>
                <div class="chart-container">
                    <canvas id="trend-chart"></canvas>
                </div>
            </section>

            <section class="stat-section stat-grid">
                <div class="stat-item">
                    <span class="stat-item-label">24h avg</span>
                    <span class="stat-item-value" id="avg-24h">—</span>
                </div>
                <div class="stat-item">
                    <span class="stat-item-label">7d avg</span>
                    <span class="stat-item-value" id="avg-7d">—</span>
                </div>
                <div class="stat-item">
                    <span class="stat-item-label">Peak</span>
                    <span class="stat-item-value" id="peak">—</span>
                </div>
                <div class="stat-item">
                    <span class="stat-item-label">Low</span>
                    <span class="stat-item-value" id="low">—</span>
                </div>
            </section>

            <section class="stat-section">
                <h2 class="stat-label">By Country</h2>
                <ul class="country-list" id="country-list">
                    <li class="country-item country-empty">No data yet</li>
                </ul>
            </section>
        </aside>
    </main>

    <footer class="footer">
        <span>Data: <a href="https://www.adsb.lol" target="_blank" rel="noopener">ADSB.lol</a> (ODbL)</span>
        <span class="footer-sep">&middot;</span>
        <span>Argus</span>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
