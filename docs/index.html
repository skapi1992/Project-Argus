<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGUS — Military Airspace Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <span class="header-title">PROJECT ARGUS</span>
            <span class="header-sep">&middot;</span>
            <span class="header-subtitle">Military Airspace Monitor</span>
            <span class="header-sep">&middot;</span>
            <span class="header-live" id="header-status">Live</span>
        </div>
    </header>

    <main class="main">
        <div class="map-container">
            <div id="map"></div>
        </div>

        <aside class="stats-panel">
            <section class="stat-section">
                <h2 class="stat-label">Active Now</h2>
                <div class="stat-value" id="current-count">—</div>
            </section>

            <section class="stat-section stat-grid">
                <div class="stat-item">
                    <span class="stat-item-label">24h avg</span>
                    <span class="stat-item-value" id="avg-24h">—</span>
                </div>
                <div class="stat-item">
                    <span class="stat-item-label">7d avg</span>
                    <span class="stat-item-value" id="avg-7d">—</span>
                </div>
                <div class="stat-item">
                    <span class="stat-item-label">Peak</span>
                    <span class="stat-item-value" id="peak">—</span>
                </div>
                <div class="stat-item">
                    <span class="stat-item-label">Low</span>
                    <span class="stat-item-value" id="low">—</span>
                </div>
            </section>

            <section class="stat-section">
                <h2 class="stat-label">Trend (7 Days)</h2>
                <div class="chart-container">
                    <canvas id="trend-chart"></canvas>
                </div>
            </section>

            <section class="stat-section">
                <h2 class="stat-label">By Country</h2>
                <ul class="country-list" id="country-list">
                    <li class="country-item country-empty">No data yet</li>
                </ul>
            </section>
        </aside>
    </main>

    <footer class="footer">
        <span>Data: <a href="https://opensky-network.org" target="_blank" rel="noopener">OpenSky Network</a></span>
        <span class="footer-sep">&middot;</span>
        <span id="last-updated">Updated: —</span>
        <span class="footer-sep">&middot;</span>
        <span>Argus</span>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
