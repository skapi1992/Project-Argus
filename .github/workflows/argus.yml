name: Argus Data Pipeline

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/github-pages-hello-world-FhDLI

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Test API connectivity
        continue-on-error: true
        run: |
          curl -s -o /dev/null -w "airplanes.live: %{http_code}\n" "<https://api.airplanes.live/v2/mil>"
          curl -s -o /dev/null -w "adsb.one: %{http_code}\n" "<https://api.adsb.one/v2/mil>"
          curl -s -o /dev/null -w "<adsb.fi>: %{http_code}\n" "<https://api.adsb.fi/v2/mil>"
          curl -s -o /dev/null -w "adsb.lol: %{http_code}\n" "<https://api.adsb.lol/v2/mil>"

      - name: Run ingestion
        continue-on-error: true
        run: python backend/ingest.py

      - name: Run processing
        run: python backend/process.py

      - name: Export JSON
        run: python backend/export.py

      - name: Commit and push
        run: |
          git config user.name "Argus Bot"
          git config user.email "argus-bot@users.noreply.github.com"
          git add docs/data/
          git diff --cached --quiet || git commit -m "Update Argus data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin claude/github-pages-hello-world-FhDLI
