name: Argus Data Pipeline

# External cron trigger setup (for reliable refreshes):
#   GitHub Actions cron can be delayed or skipped. For reliable 5-min intervals,
#   use an external service (cron-job.org, UptimeRobot, Easycron) to POST:
#
#   URL:  https://api.github.com/repos/OWNER/REPO/dispatches
#   Headers:
#     Authorization: Bearer <PAT with repo or actions:write scope>
#     Accept: application/vnd.github+json
#   Body: {"event_type": "refresh"}
#
#   Set the external cron to run every 5 minutes for consistent data freshness.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [refresh]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/github-pages-hello-world-FhDLI

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run ingestion
        continue-on-error: true
        env:
          OPENSKY_CLIENT_ID: ${{ secrets.OPENSKY_CLIENT_ID }}
          OPENSKY_CLIENT_SECRET: ${{ secrets.OPENSKY_CLIENT_SECRET }}
        run: python backend/ingest.py

      - name: Run processing
        run: python backend/process.py

      - name: Export JSON
        run: python backend/export.py

      - name: Commit and push
        run: |
          git config user.name "Argus Bot"
          git config user.email "argus-bot@users.noreply.github.com"
          git add docs/data/
          git diff --cached --quiet || git commit -m "Update Argus data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin claude/github-pages-hello-world-FhDLI
