name: Argus Watchdog

on:
  schedule:
    - cron: '1/5 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/github-pages-hello-world-FhDLI
          fetch-depth: 0

      - name: Check data freshness
        id: freshness
        run: |
          LAST_COMMIT_EPOCH=$(git log -1 --format=%ct -- docs/data/live.json)

          if [ -z "$LAST_COMMIT_EPOCH" ]; then
            echo "No commits found for docs/data/live.json — treating as stale"
            echo "stale=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NOW_EPOCH=$(date +%s)
          AGE_SECONDS=$((NOW_EPOCH - LAST_COMMIT_EPOCH))
          AGE_MINUTES=$((AGE_SECONDS / 60))

          echo "Last update: ${AGE_MINUTES} minutes ago (${AGE_SECONDS}s)"

          if [ "$AGE_SECONDS" -gt 360 ]; then
            echo "Data is STALE (${AGE_MINUTES}m > 6m threshold)"
            echo "stale=true" >> "$GITHUB_OUTPUT"
          else
            echo "Data is FRESH (${AGE_MINUTES}m <= 6m threshold)"
            echo "stale=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger main pipeline
        if: steps.freshness.outputs.stale == 'true'
        run: |
          echo "Dispatching argus.yml workflow..."
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/argus.yml/dispatches" \
            -d '{"ref":"claude/github-pages-hello-world-FhDLI"}'
          echo "Dispatch sent successfully"
