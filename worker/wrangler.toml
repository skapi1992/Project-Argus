name = "project-argus-cron"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Cron trigger — runs every 5 minutes
[triggers]
crons = ["*/5 * * * *"]

# KV namespace binding — create with:
#   wrangler kv namespace create ARGUS_KV
# Then update the id below with the returned namespace ID
[[kv_namespaces]]
binding = "ARGUS_KV"
id = "YOUR_KV_NAMESPACE_ID"

# Secrets (set via Cloudflare dashboard or wrangler):
#   wrangler secret put GITHUB_PAT
#
# Environment variables (optional overrides):
# [vars]
# GITHUB_OWNER = "skapi1992"
# GITHUB_REPO = "Project-Argus"
# GITHUB_BRANCH = "main"
